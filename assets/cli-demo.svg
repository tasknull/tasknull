  <text x="24" y="290" fill="#63cad6" opacity="0">  ✓ nullifier unspent<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.431;0.437;0.93;1" dur="13.0s" repeatCount="indefinite"/></text>
  <text x="24" y="312" fill="#63cad6" font-weight="700" opacity="0">  ✓ VALID — proof checks out<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.472;0.478;0.93;1" dur="13.0s" repeatCount="indefinite"/></text>
  <text x="24" y="356" opacity="0"><tspan fill="#f2b441">$ </tspan><tspan fill="#e8eaf0">tasknull claim proof.json</tspan><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.554;0.560;0.93;1" dur="13.0s" repeatCount="indefinite"/></text>
  <text x="24" y="378" fill="#63cad6" opacity="0">✓ settled — nullifier burned, reward released<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.596;0.602;0.93;1" dur="13.0s" repeatCount="indefinite"/></text>
