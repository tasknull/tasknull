  <text x="410" y="25" text-anchor="middle" fill="#878ea1" font-size="13">~/bounty — tasknull</text>
    <text x="24" y="70" opacity="0"><tspan fill="#f2b441">$ </tspan><tspan fill="#e8eaf0">tasknull init</tspan><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.020;0.026;0.93;1" dur="13.0s" repeatCount="indefinite"/></text>
  <text x="24" y="92" fill="#63cad6" opacity="0">✓ identity created  → ~/.tasknull/identity.json<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.061;0.067;0.93;1" dur="13.0s" repeatCount="indefinite"/></text>
  <text x="24" y="136" opacity="0"><tspan fill="#f2b441">$ </tspan><tspan fill="#e8eaf0">tasknull prove --bounty zk-audit-114 --file solution.txt \</tspan><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.143;0.149;0.93;1" dur="13.0s" repeatCount="indefinite"/></text>
  <text x="24" y="158" fill="#878ea1" opacity="0">        --to 7xKX…osgAsU --out proof.json<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.184;0.190;0.93;1" dur="13.0s" repeatCount="indefinite"/></text>
  <text x="24" y="180" fill="#63cad6" opacity="0">✓ proof written  → proof.json<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.226;0.232;0.93;1" dur="13.0s" repeatCount="indefinite"/></text>
  <text x="24" y="202" fill="#f6c869" opacity="0">  nullifier  b2cff4743741e95bf57296e7…e0c1<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.267;0.273;0.93;1" dur="13.0s" repeatCount="indefinite"/></text>
  <text x="24" y="246" opacity="0"><tspan fill="#f2b441">$ </tspan><tspan fill="#e8eaf0">tasknull verify proof.json</tspan><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.349;0.355;0.93;1" dur="13.0s" repeatCount="indefinite"/></text>
